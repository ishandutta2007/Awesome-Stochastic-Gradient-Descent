<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="auto">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8A2387;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E94057;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F27121;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="5" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1200" height="300" fill="url(#grad1)" rx="15" ry="15"/>
  <text x="600" y="150" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle" filter="url(#shadow)">
    Awesome Stochastic Gradient Descent
  </text>
  <text x="600" y="220" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="normal" fill="#FFEAA7" text-anchor="middle" dominant-baseline="middle">
    A comprehensive guide to SGD and its variants
  </text>
  <!-- Decorative elements -->
  <path d="M 100 250 Q 200 100 300 200 T 500 150" fill="none" stroke="white" stroke-width="4" opacity="0.3"/>
  <path d="M 700 100 Q 800 250 900 150 T 1100 200" fill="none" stroke="white" stroke-width="4" opacity="0.3"/>
</svg>
